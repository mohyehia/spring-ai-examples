spring:
  application:
    name: spring-ai-mcp-client
  ai:
    ollama:
      chat:
        model: "gemma4:e2b"
    mcp:
      client:
        stdio:
          #          servers-configuration: classpath:mcp-server-config.json
          connections:
            tavily-search:
              command: "cmd.exe"
              args:
                - "/c"
                - "npx"
                - "-y"
                - "tavily-mcp@0.2.0"
              env:
                TAVILY_API_KEY: ${TAVILY_API_KEY}
                DEFAULT_PARAMETERS: "{\"include_images\": false, \"max_results\": 5, \"search_depth\": \"basic\"}"
        type: sync
        request-timeout: 30s
        root-change-notification: false
        streamable-http:
          connections:
            weather-service:
              url: "http://localhost:8092"
              endpoint: "/mcp"

server:
  port: 8091
  tomcat:
    connection-timeout: 50000

logging:
  level:
    root: info
    org.springframework.ai: debug
    org.springframework.ai.chat.client.advisor: debug
